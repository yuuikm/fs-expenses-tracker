name: expenses-tracker-prod

services:
  postgres:
    image: postgres:15
    env_file:
      - .env.prod
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-prod-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./expenses-tracker-back
      target: production
    env_file:
      - .env.prod
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./expenses-tracker-front
      target: production
    env_file:
      - .env.prod
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-prod-data:
  redis-prod-data: