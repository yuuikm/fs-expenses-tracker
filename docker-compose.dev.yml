name: expenses-tracker-dev

services:
  postgres:
    image: postgres:15
    env_file:
      - .env.dev
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-dev-data:/data

  backend:
    build:
      context: ./expenses-tracker-back
      target: development
    env_file:
      - .env.dev
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./expenses-tracker-back:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./expenses-tracker-front
      target: development
    env_file:
      - .env.dev
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./expenses-tracker-front:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-dev-data:
  redis-dev-data: