name: expenses-tracker-test

services:
  postgres:
    image: postgres:15
    env_file:
      - .env.test
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-test-data:/data

  backend:
    build:
      context: ./expenses-tracker-back
      target: test
    env_file:
      - .env.test
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      - postgres
      - redis
    command: sh -c "npm install && npm run start"

  frontend:
    build:
      context: ./expenses-tracker-front
      target: test
    env_file:
      - .env.test
    ports:
      - "${FRONTEND_PORT}:4200"
    depends_on:
      - backend
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"

volumes:
  postgres-test-data:
  redis-test-data:
